<!DOCTYPE html>
<html lang="zh-cn">
<head>
	<meta charset="utf-8">
	<title>生日快乐 - 邢玲芳</title>
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
	<meta name="renderer" content="webkit">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<style type="text/css">
		*{margin: 0; padding: 0;}
		@font-face {
			font-family: JournalRegular;
			src: url('./font/journal-webfont.woff') format("woff");
		}
		.content{
			position: relative;
			overflow: hidden;
		}
		.heart {
		    position: absolute;
		    top: 50%;
		    left: 50%;
		    width: 566px;
		    display: block;
		    overflow: hidden;
		    /* background: url(./img/bg.png) 0 0 no-repeat; */
		    -webkit-transform: translate3d(-50%, -52%, 0);
		    transform: translate3d(-50%, -52%, 0);
		    display: none;
		}
		.heart img{
			height: 100%;
		}
		#garden{
			position: relative;
			z-index: 2;
		}
		.logo{
			text-align: center;
			margin-top: -43px;
		}
		.show{
			position: relative;
			width: 670px;
			height: 650px;
			float: left;
		}
		.pic{
			height: 236px;
			position: relative;
			overflow: hidden;
			text-align: center;
		}
		.info p{
			text-align: center;
			font-family: 'JournalRegular', Arial, sans-serif;
		}
		.info p:nth-child(1){
			font-size: 42px;
		}
		.info p:nth-child(3){
			font-size: 30px;
		}
		.clearfix:after {
		    content: "\00A0";
		    display: block;
		    visibility: hidden;
		    width: 0;
		    height: 0;
		    clear: both;
		    font-size: 0;
		    line-height: 0;
		    overflow: hidden;
		}
		.clearfix{zoom:1}
		.typed-cursor{
            opacity: 1;
            font-weight: 100;
            -webkit-animation: blink 0.7s infinite;
            -moz-animation: blink 0.7s infinite;
            -ms-animation: blink 0.7s infinite;
            -o-animation: blink 0.7s infinite;
            animation: blink 0.7s infinite;
        }
        @-keyframes blink{
            0% { opacity:1; }
            50% { opacity:0; }
            100% { opacity:1; }
        }
        @-webkit-keyframes blink{
            0% { opacity:1; }
            50% { opacity:0; }
            100% { opacity:1; }
        }
        @-moz-keyframes blink{
            0% { opacity:1; }
            50% { opacity:0; }
            100% { opacity:1; }
        }
        @-ms-keyframes blink{
            0% { opacity:1; }
            50% { opacity:0; }
            100% { opacity:1; }
        }
        @-o-keyframes blink{
            0% { opacity:1; }
            50% { opacity:0; }
            100% { opacity:1; }
        }
        .main{
        	width: 1070px;
        	margin: 0 auto;
        }
        .txt{
        	width: 400px;
        	float: left;
        	line-height: 30px;
        	padding-top: 56px;
        }
        .desc{
        	position: absolute;
		    bottom: 0px;
		    left: 0px;
		    width: 100%;
		    text-align: center;
		    line-height: 34px;
		    background: rgba(0, 0, 0, 0.701961);
		    color: rgb(255, 255, 255);
		    color: #fff;
		    display: none;
        }
	</style>
</head>
<body>
	<div class="content">
		<div class="logo"><img src="./img/kuaile.gif" alt="生日快乐"></div>
		
		<div class="main clearfix">
			<div class="txt">
				<div class="type-wrap">
		            <!-- <div id="typed-strings">
		                <span>Typed.js is a <strong>jQuery</strong> plugin.</span>
		                <p>It <em>types</em> out sentences.</p>
		                <p>And then deletes them.</p>
		                <p>Try it out!</p>
		            </div> -->
		            <span id="typed" style="white-space:pre;"></span>
		        </div>
			</div>
			<div class="show">
				<div class="heart">
					<div class="pic">
						<img  src="./img/1.jpg" alt="邢灵芳">
						<div class="desc"></div>
					</div>
					<div class="info">
						<p>the times we together</p>
						<p>师少兵 & 邢玲芳</p>
						<p id="elapseClock"></p>
					</div>
				</div>
				<canvas id="garden" width="670" height="650">不支持canvas</canvas>
			</div>
		</div>
	</div>
	
	<!-- <div class="heart">
		
	</div> -->
	
	<script src="http://mat1.gtimg.com/libs/jquery/1.12.0/jquery.min.js"></script>
	<script type="text/javascript" src="./js/garden.js"></script>
	<script type="text/javascript" src="./js/typed.js"></script>
	<script type="text/javascript" src="./js/index.js"></script>
</body>
</html>
